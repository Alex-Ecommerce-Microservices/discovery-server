name: CI for Discovery service

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .  # Build ngay tại thư mục gốc của repo này
          push: true
          platforms: linux/amd64, linux/arm64  # Build đa kiến trúc để hỗ trợ cả AMD64 và ARM64
          tags: |
          # 1. Luôn cập nhật bản mới nhất cho Watchtower
            ${{ secrets.DOCKERHUB_USERNAME }}/discovery-service:latest
          # 2. Đánh số phiên bản theo số lần chạy của GitHub (v1, v2, v3...)
            ${{ secrets.DOCKERHUB_USERNAME }}/discovery-service:v${{ github.run_number }}